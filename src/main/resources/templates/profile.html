<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Thông tin tài khoản - Gaming Shop</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.1/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .login-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 15px;
        padding: 2rem;
        width: 100%;
        max-width: 500px;
        color: white;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
      }
      .form-control {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: white;
      }
      .form-control:focus {
        background: rgba(255, 255, 255, 0.15);
        border-color: #dc3545;
        color: white;
        box-shadow: 0 0 0 0.25rem rgba(220, 53, 69, 0.25);
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <div class="text-center mb-4">
        <h2 class="fw-bold">
          <i class="bi bi-person-fill text-danger me-2"></i>THÔNG TIN TÀI KHOẢN
        </h2>
        <p class="text-white-50">Quản lý thông tin cá nhân</p>
      </div>

      <div
        th:if="${param.updated}"
        class="alert alert-success text-center small py-2"
      >
        Cập nhật thông tin thành công!
      </div>

      <form th:action="@{/profile}" method="post" th:object="${nguoiDung}">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input
            type="email"
            th:field="*{email}"
            class="form-control"
            readonly
          />
        </div>
        <div class="mb-3">
          <label class="form-label">Họ và tên</label>
          <input type="text" th:field="*{ten}" class="form-control" required />
        </div>
        <div class="mb-3">
          <label class="form-label"
            >Mật khẩu mới
            <small class="text-white-50">(để trống nếu không đổi)</small></label
          >
          <input
            type="password"
            th:field="*{password}"
            class="form-control"
            placeholder="******"
          />
        </div>
        <div class="mb-3">
          <label class="form-label">Số điện thoại</label>
          <input type="text" th:field="*{soDienThoai}" class="form-control" />
        </div>
        <div class="mb-3">
          <label class="form-label">Giới tính</label>
          <select th:field="*{gioiTinh}" class="form-control">
            <option th:value="true" th:text="'Nam'"></option>
            <option th:value="false" th:text="'Nữ'"></option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Ngày sinh</label>
          <input type="date" th:field="*{ngaySinh}" class="form-control" />
        </div>
        <button type="submit" class="btn btn-danger w-100 py-2 fw-bold mb-3">
          LƯU THAY ĐỔI
        </button>
        <div class="text-center mt-3">
          <a href="/" class="text-secondary text-decoration-none"
            ><i class="bi bi-arrow-left me-1"></i>Về trang chủ</a
          >
        </div>
      </form>
    </div>
  </body>
</html>
