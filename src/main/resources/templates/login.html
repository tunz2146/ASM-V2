<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đăng nhập - Gaming Shop</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.1/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            color: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #dc3545;
            color: white;
            box-shadow: 0 0 0 0.25rem rgba(220, 53, 69, 0.25);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <h2 class="fw-bold"><i class="bi bi-controller text-danger me-2"></i>ĐĂNG NHẬP</h2>
            <p class="text-white-50">Chào mừng trở lại Gaming Shop</p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger text-center small py-2">
            Email hoặc mật khẩu không đúng!
        </div>
        <div th:if="${param.logout}" class="alert alert-success text-center small py-2">
            Đăng xuất thành công!
        </div>

        <form th:action="@{/do-login}" method="post">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent text-white border-secondary"><i class="bi bi-envelope"></i></span>
                    <input type="email" name="username" class="form-control" placeholder="name@example.com" required>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Mật khẩu</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent text-white border-secondary"><i class="bi bi-key"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Nhập mật khẩu" required>
                </div>
            </div>

            <div class="d-flex justify-content-between mb-4 small">
                <div class="form-check">
                    <input class="form-check-input bg-secondary border-secondary" type="checkbox" id="remember">
                    <label class="form-check-label text-white-50" for="remember">Ghi nhớ</label>
                </div>
                <a href="#" class="text-danger text-decoration-none">Quên mật khẩu?</a>
            </div>

            <button type="submit" class="btn btn-danger w-100 py-2 fw-bold mb-3">ĐĂNG NHẬP</button>
            
            <div class="text-center small">
                <span class="text-white-50">Chưa có tài khoản?</span>
                <a href="/register" class="text-danger text-decoration-none fw-bold">Đăng ký ngay</a>
            </div>
            <div class="text-center mt-3">
                 <a href="/" class="text-secondary text-decoration-none"><i class="bi bi-arrow-left me-1"></i>Về trang chủ</a>
            </div>
        </form>
    </div>
</body>
</html>
