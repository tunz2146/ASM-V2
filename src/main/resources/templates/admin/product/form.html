<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title th:text="${product.id == null ? 'Thêm sản phẩm mới' : 'Cập nhật sản phẩm'}">Form Sản phẩm</title>
</head>
<body>
    <div layout:fragment="content" class="container mt-4 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-danger text-white">
                        <h5 class="mb-0 fw-bold" 
                            th:text="${product.id == null ? 'THÊM SẢN PHẨM MỚI' : 'CẬP NHẬT SẢN PHẨM'}">
                            FORM
                        </h5>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/admin/products/save}" th:object="${product}" 
                              method="post" enctype="multipart/form-data">
                            
                            <input type="hidden" th:field="*{id}">
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Tên sản phẩm</label>
                                <input type="text" class="form-control" th:field="*{tenSanPham}" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Slug (Đường dẫn)</label>
                                <input type="text" class="form-control" th:field="*{slug}" placeholder="ví-dụ-như-này" required>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Giá bán (VNĐ)</label>
                                    <input type="number" class="form-control" th:field="*{giaSanPham}" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Giảm giá (%)</label>
                                    <input type="number" class="form-control" th:field="*{chietKhau}" value="0">
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Số lượng tồn</label>
                                    <input type="number" class="form-control" th:field="*{tonKho}" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Thương hiệu</label>
                                    <select class="form-select" th:field="*{hang}">
                                        <option th:each="h : ${brands}" 
                                                th:value="${h.id}" 
                                                th:text="${h.tenHang}"></option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Danh mục (Giữ Ctrl để chọn nhiều)</label>
                                <select class="form-select" th:field="*{loaiSanPhams}" multiple size="4">
                                    <option th:each="c : ${categories}" 
                                            th:value="${c.id}" 
                                            th:text="${c.ten}"></option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Hình ảnh sản phẩm</label>
                                
                                <div class="card p-3 bg-light border-0">
                                    <ul class="nav nav-pills mb-3" id="pills-tab" role="tablist">
                                        <li class="nav-item" role="presentation">
                                            <button class="nav-link active btn-sm" id="upload-tab" data-bs-toggle="pill" data-bs-target="#pills-upload" type="button" role="tab">
                                                <i class="bi bi-cloud-upload me-1"></i>Tải ảnh lên
                                            </button>
                                        </li>
                                        <li class="nav-item" role="presentation">
                                            <button class="nav-link btn-sm" id="url-tab" data-bs-toggle="pill" data-bs-target="#pills-url" type="button" role="tab">
                                                <i class="bi bi-link-45deg me-1"></i>Dùng URL Online
                                            </button>
                                        </li>
                                    </ul>
                                    
                                    <div class="tab-content" id="pills-tabContent">
                                        <div class="tab-pane fade show active" id="pills-upload" role="tabpanel">
                                            <input type="file" name="imageFile" class="form-control" accept="image/*" onchange="previewImage(this)">
                                            <small class="text-muted mt-1 d-block">Hỗ trợ: jpg, png, webp...</small>
                                        </div>
                                        
                                        <div class="tab-pane fade" id="pills-url" role="tabpanel">
                                            <input type="text" name="imageUrl" class="form-control" 
                                                   placeholder="Dán link ảnh vào đây (Ví dụ: https://imgur.com/...)" 
                                                   oninput="previewUrl(this.value)">
                                        </div>
                                    </div>

                                    <div class="mt-3 text-center" style="min-height: 150px; border: 2px dashed #ccc; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: white; overflow: hidden;">
                                        
                                        <img id="imagePreview" 
                                             th:if="${product.hinhAnh != null}"
                                             th:src="${#strings.startsWith(product.hinhAnh, 'http') ? product.hinhAnh : '/images/products/' + product.hinhAnh}"
                                             style="max-height: 200px; max-width: 100%;" class="rounded">
                                             
                                        <img id="placeholderImage" src="https://via.placeholder.com/150?text=Preview" 
                                             th:if="${product.hinhAnh == null}"
                                             style="max-height: 150px; opacity: 0.5;">
                                        
                                        <span id="noImageText" class="text-muted position-absolute" th:if="${product.hinhAnh == null}" style="z-index: 1;">
                                            Chưa chọn ảnh
                                        </span>
                                    </div>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Mô tả / Thông số kỹ thuật</label>
                                <textarea class="form-control" th:field="*{thongSo}" rows="4"></textarea>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-danger px-4 fw-bold">
                                    <i class="bi bi-save me-2"></i>Lưu sản phẩm
                                </button>
                                <a href="/admin/products" class="btn btn-secondary px-4">
                                    <i class="bi bi-x-circle me-2"></i>Hủy
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script layout:fragment="scripts">
        // 1. Preview khi chọn file từ máy
        function previewImage(input) {
            const preview = document.getElementById('imagePreview');
            const placeholder = document.getElementById('placeholderImage');
            const noImageText = document.getElementById('noImageText');
            
            if (input.files && input.files[0]) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    // Nếu chưa có thẻ img preview thì tạo mới (trường hợp thêm mới)
                    if (!preview) {
                        const img = document.createElement('img');
                        img.id = 'imagePreview';
                        img.style.maxHeight = '200px';
                        img.style.maxWidth = '100%';
                        img.className = 'rounded';
                        img.src = e.target.result;
                        input.closest('.card').querySelector('.text-center').appendChild(img);
                        
                        // Ẩn placeholder cũ
                        if(placeholder) placeholder.style.display = 'none';
                        if(noImageText) noImageText.style.display = 'none';
                    } else {
                        preview.src = e.target.result;
                        preview.style.display = 'block';
                        if(placeholder) placeholder.style.display = 'none';
                        if(noImageText) noImageText.style.display = 'none';
                    }
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // 2. Preview khi nhập URL
        function previewUrl(url) {
            const preview = document.getElementById('imagePreview');
            const placeholder = document.getElementById('placeholderImage');
            const noImageText = document.getElementById('noImageText');
            const container = document.querySelector('.card .text-center');

            if (url.trim() !== "") {
                if (!preview) {
                    const img = document.createElement('img');
                    img.id = 'imagePreview';
                    img.style.maxHeight = '200px';
                    img.style.maxWidth = '100%';
                    img.className = 'rounded';
                    img.src = url;
                    // Xử lý lỗi ảnh chết
                    img.onerror = function() { this.src = 'https://via.placeholder.com/150?text=Lỗi+Ảnh'; };
                    
                    container.appendChild(img);
                    
                    if(placeholder) placeholder.style.display = 'none';
                    if(noImageText) noImageText.style.display = 'none';
                } else {
                    preview.src = url;
                    preview.style.display = 'block';
                    preview.onerror = function() { this.src = 'https://via.placeholder.com/150?text=Lỗi+Ảnh'; };
                    
                    if(placeholder) placeholder.style.display = 'none';
                    if(noImageText) noImageText.style.display = 'none';
                }
            }
        }
    </script>
</body>
</html>
